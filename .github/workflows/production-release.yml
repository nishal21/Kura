name: Production Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag when manually triggered (example: v1.0.0)"
        required: true
        type: string

concurrency:
  group: production-release
  cancel-in-progress: false

permissions:
  contents: write

env:
  CI: true
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: stable

jobs:
  build-bundles:
    name: Build Release Bundles (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies for Tauri
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Detect host Rust target and override workspace target
        shell: pwsh
        run: |
          $hostTarget = ((rustc -vV | Select-String '^host:').ToString().Split(':')[1]).Trim()
          "RUST_HOST_TARGET=$hostTarget" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_BUILD_TARGET=$hostTarget" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using host target: $hostTarget"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run test

      - name: Build Linux production bundles
        if: runner.os == 'Linux'
        run: npm run build -- --target ${{ env.RUST_HOST_TARGET }} --bundles deb appimage

      - name: Build macOS production bundles
        if: runner.os == 'macOS'
        run: npm run build -- --target ${{ env.RUST_HOST_TARGET }} --bundles app dmg

      - name: Build Windows production bundles
        if: runner.os == 'Windows'
        run: npm run build -- --target ${{ env.RUST_HOST_TARGET }} --bundles msi nsis

      - name: Collect installer artifacts only
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-installers

          # Keep only distributable installers, not bundle internals.
          find src-tauri/target -type f \( \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*.exe" \
          \) -print0 | while IFS= read -r -d '' file; do
            cp -f "$file" release-installers/
          done

          if [ "$(find release-installers -maxdepth 1 -type f | wc -l)" -eq 0 ]; then
            echo "No installer artifacts were collected from src-tauri/target"
            exit 1
          fi

          echo "Collected installers:"
          ls -lah release-installers

      - name: Upload OS release bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-${{ matrix.os }}
          path: release-installers/**
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-bundles
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all release bundles
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-release-*
          path: release-artifacts
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release and upload installers (retry on rate limits)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail

          run_with_retry() {
            local max_attempts=6
            local base_delay_seconds=30
            local attempt=1

            while true; do
              if "$@"; then
                return 0
              fi

              local exit_code=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return "$exit_code"
              fi

              local sleep_seconds=$((base_delay_seconds * attempt))
              echo "GitHub API call failed (attempt ${attempt}/${max_attempts}). Retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          tag="$RELEASE_TAG"
          title="Kura ${tag}"

          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            is_draft="$(gh release view "$tag" --repo "$GH_REPO" --json isDraft --jq '.isDraft')"

            if [ "$is_draft" = "true" ]; then
              echo "Draft release ${tag} exists. Recreating it to remove stale/bulk assets."
              run_with_retry gh release delete "$tag" --repo "$GH_REPO" --yes
            else
              echo "Published release ${tag} exists. Assets will be updated in place."
            fi
          fi

          if ! gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            run_with_retry gh release create "$tag" \
              --repo "$GH_REPO" \
              --title "$title" \
              --notes "Automated production release for ${tag}." \
              --target "${GITHUB_SHA}"
          fi

          mapfile -t artifact_files < <(find release-artifacts -type f | sort)

          if [ "${#artifact_files[@]}" -eq 0 ]; then
            echo "No release artifacts found in release-artifacts"
            exit 1
          fi

          echo "Uploading ${#artifact_files[@]} release assets"
          printf '%s\n' "${artifact_files[@]}"

          run_with_retry gh release upload "$tag" "${artifact_files[@]}" --repo "$GH_REPO" --clobber
