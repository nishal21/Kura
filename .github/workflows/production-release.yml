name: Production Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag when manually triggered (example: v1.0.0)"
        required: true
        type: string

concurrency:
  group: production-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CI: true
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: stable

jobs:
  build-bundles:
    name: Build Release Bundles (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies for Tauri
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Detect host Rust target and override workspace target
        shell: pwsh
        run: |
          $hostTarget = ((rustc -vV | Select-String '^host:').ToString().Split(':')[1]).Trim()
          "RUST_HOST_TARGET=$hostTarget" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_BUILD_TARGET=$hostTarget" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using host target: $hostTarget"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run test

      - name: Build production app bundles
        run: npm run build -- --bundles all

      - name: Upload OS release bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-${{ matrix.os }}
          path: |
            src-tauri/target/${{ env.RUST_HOST_TARGET }}/release/bundle/**
            src-tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-bundles
    permissions:
      contents: write

    steps:
      - name: Download all release bundles
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-release-*
          path: release-artifacts
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release and upload installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          target_commitish: ${{ github.sha }}
          name: Kura ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release-artifacts/**
          fail_on_unmatched_files: true
